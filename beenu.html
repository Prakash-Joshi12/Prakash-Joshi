<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beenu AI - Moveable Assistant</title>
    <style>
        :root { --glow: #00f2ff; --bg: #080808; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            /* Prevents the screen from shaking/scrolling on mobile while dragging Beenu */
            touch-action: none; 
        }

        /* --- MOVEABLE AVATAR --- */
        #beenuAvatar {
            position: absolute;
            top: 100px;
            left: 100px;
            width: 120px;
            height: 120px;
            cursor: grab;
            z-index: 1000;
            border-radius: 20px;
            /* Your original path */
            background-image: url("C:/Users/Lenovo/Downloads/WhatsApp Image 2026-02-22 at 15.58.57.jpeg"); 
            background-size: cover;
            background-position: center;
            border: 2px solid var(--glow);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            transition: transform 0.2s;
        }

        #beenuAvatar:active { cursor: grabbing; transform: scale(0.95); }

        .listening {
            animation: pulse 1s infinite alternate;
            border-color: white !important;
            box-shadow: 0 0 40px var(--glow) !important;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 10px var(--glow); }
            to { box-shadow: 0 0 50px var(--glow); }
        }

        /* --- INTERFACE --- */
        .container {
            position: fixed;
            bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #transcript { font-size: 18px; color: #aaa; margin-bottom: 15px; text-align: center; max-width: 80%; }
        
        .input-bar {
            display: flex;
            background: rgba(20,20,20,0.9);
            border: 1px solid #333;
            border-radius: 50px;
            padding: 10px 20px;
            width: 85%; /* Adjusted for mobile width */
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 5px; font-size: 16px; }
        button { background: var(--glow); border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="beenuAvatar" onclick="toggleVoice()" title="Click to speak / Hold to move"></div>

    <div class="container">
        <div id="transcript">"I am Beenu. Ready to assist."</div>
        <div class="input-bar">
            <input type="text" id="idTextIn" placeholder="Type or use voice...">
            <button onclick="handleText()">Go</button>
        </div>
    </div>

    <script>
        const avatar = document.getElementById('beenuAvatar');
        const transcript = document.getElementById('transcript');
        const textIn = document.getElementById('idTextIn');
        const synth = window.speechSynthesis;

        // --- 1. UNIVERSAL DRAG LOGIC (Works on Mouse and Touch/Mobile) ---
        let isDragging = false;
        let offset = { x: 0, y: 0 };

        function onStart(e) {
            isDragging = true;
            const clientX = e.touches ? e.touches.clientX : e.clientX;
            const clientY = e.touches ? e.touches.clientY : e.clientY;
            offset.x = clientX - avatar.offsetLeft;
            offset.y = clientY - avatar.offsetTop;
        }

        function onMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches.clientX : e.clientX;
            const clientY = e.touches ? e.touches.clientY : e.clientY;
            avatar.style.left = (clientX - offset.x) + 'px';
            avatar.style.top = (clientY - offset.y) + 'px';
            if (e.cancelable) e.preventDefault(); 
        }

        function onEnd() { isDragging = false; }

        // Mouse Listeners
        avatar.addEventListener('mousedown', onStart);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);

        // Touch Listeners (For Mobile/iOS/Android)
        avatar.addEventListener('touchstart', onStart, {passive: false});
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('touchend', onEnd);

        // --- 2. VOICE SETUP (Your original logic) ---
        let femaleVoice;
        function loadVoices() {
            const voices = synth.getVoices();
            femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Samantha'));
            if (!femaleVoice) femaleVoice = voices;
        }
        synth.onvoiceschanged = loadVoices;

        function speak(text) {
            if (synth.speaking) synth.cancel(); // Clears voice queue for better response
            const msg = new SpeechSynthesisUtterance(text);
            msg.voice = femaleVoice;
            msg.pitch = 1.1;
            synth.speak(msg);
            transcript.innerText = text;
        }

        // --- 3. RECOGNITION ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            
            recognition.onresult = (e) => {
                const result = e.results[e.results.length - 1].transcript;
                processCommand(result);
                active = false;
                avatar.classList.remove('listening');
            };

            recognition.onerror = () => {
                active = false;
                avatar.classList.remove('listening');
            };
        }

        let active = false;
        function toggleVoice() {
            if (isDragging) return;
            if (!recognition) {
                alert("Speech recognition not supported on this browser.");
                return;
            }
            if (!active) {
                recognition.start();
                active = true;
                avatar.classList.add('listening');
                speak("I am listening.");
            } else {
                recognition.stop();
                active = false;
                avatar.classList.remove('listening');
            }
        }

        function handleText() {
            if(textIn.value) { processCommand(textIn.value); textIn.value = ''; }
        }

        // --- 4. COMMAND LOGIC ---
        function processCommand(cmd) {
            const input = cmd.toLowerCase();
            transcript.innerText = `Thinking: ${cmd}`;

            const systemMap = {
                "whatsapp": "whatsapp://",
                "calculator": "calculator:",
                "settings": "ms-settings:",
                "camera": "microsoft.windows.camera:",
                "paint": "ms-paint:",
                "notepad": "notepad://"
            };

            let appFound = false;
            for (let app in systemMap) {
                if (input.includes(app)) {
                    appFound = true;
                    speak(`Opening ${app}`);
                    window.location.href = systemMap[app];
                    break;
                }
            }

            if (!appFound) {
                speak("Searching for " + cmd);
                window.open(`https://www.google.com/search?q=${encodeURIComponent(cmd)}`, "_blank");
            }
        }
    </script>
</body>
</html>
